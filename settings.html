<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tính Lương</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .settings-content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            background-color: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
        }

        .form-input:focus {
            border-color: #00ff00;
        }

        .salary-summary {
            background-color: #1a1a20;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid #00ff00;
            box-shadow: 0 4px 10px rgba(0, 255, 0, 0.1);
        }

        .salary-summary h3 {
            color: #00ff00;
            margin-bottom: 10px;
            text-align: center;
        }

        .total-amount {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            color: #fff;
        }

        .multiplier-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .multiplier-item {
            background-color: #333;
            padding: 10px;
            border-radius: 8px;
        }

        .multiplier-item label {
            color: #fff;
            font-weight: 600;
            font-size: 14px;
        }

        .multiplier-item .m-value {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }

        .multiplier-item input {
            width: 60%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #555;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            outline: none;
            padding-bottom: 2px;
        }

        .multiplier-item input:focus {
            border-color: #00ff00;
        }

        .multiplier-item span {
            color: var(--text-muted);
            margin-left: 5px;
            font-weight: bold;
        }

        .header-back {
            display: flex;
            align-items: center;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
        }

        .header-back i {
            margin-right: 10px;
            color: #00ff00;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- HEADER -->
        <header class="app-header" style="justify-content: flex-start; display: flex; padding: 15px;">
            <a href="index.html" class="header-back"><i class="fa-solid fa-arrow-left"></i> Tính Lương</a>
        </header>

        <div class="settings-content">
            <div class="form-group">
                <label>Lương cơ bản (VNĐ) quy chuẩn theo:</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" class="form-input" id="base-salary" value="28000" step="1000" style="flex: 1;">
                    <select id="salary-unit" class="form-input" style="width: auto; background-color: #444; color: #fff; border-radius: 6px;">
                        <option value="hour">/ Giờ</option>
                        <option value="day">/ Ngày (8 tiếng)</option>
                        <option value="month">/ Tháng (26 ngày)</option>
                    </select>
                </div>
                <div id="hourly-rate-display" style="font-size: 13px; color: #00ff00; margin-top: 8px; font-style: italic;">
                    <!-- JS Display -->
                </div>
            </div>

            <div class="form-group">
                <label>Các khoản phụ cấp / thưởng thêm (VNĐ)</label>
                <input type="number" class="form-input" id="allowance" value="0" step="50000">
            </div>

            <div class="form-group">
                <label>Các khoản khấu trừ / BHXH/Thuế (VNĐ)</label>
                <input type="number" class="form-input" id="deduction" value="500000" step="50000"
                    style="border-left: 3px solid #ff4d4d;">
            </div>

            <h4 style="margin-bottom: 15px; color: var(--text-main);">Hệ Số Nhân Lương</h4>
            <div class="multiplier-grid">
                <div class="multiplier-item" style="border-left: 4px solid var(--bg-input-1)">
                    <label id="label-col-1">Cột 1</label>
                    <div class="m-value"><input type="number" id="multi-1" value="100"> <span>%</span></div>
                </div>
                <div class="multiplier-item" style="border-left: 4px solid var(--bg-input-2)">
                    <label id="label-col-2">Cột 2</label>
                    <div class="m-value"><input type="number" id="multi-2" value="150"> <span>%</span></div>
                </div>
                <div class="multiplier-item" style="border-left: 4px solid var(--bg-input-3)">
                    <label id="label-col-3">Cột 3</label>
                    <div class="m-value"><input type="number" id="multi-3" value="30"> <span>%</span></div>
                </div>
                <div class="multiplier-item" style="border-left: 4px solid var(--bg-input-4)">
                    <label id="label-col-4">Cột 4</label>
                    <div class="m-value"><input type="number" id="multi-4" value="200"> <span>%</span></div>
                </div>
                <div class="multiplier-item" style="border-left: 4px solid var(--bg-input-5); grid-column: span 2;">
                    <label id="label-col-5">Cột 5</label>
                    <div class="m-value"><input type="number" id="multi-5" value="100"> <span>%</span></div>
                </div>
            </div>

            <div class="salary-summary">
                <h3 id="month-display">Lương Tháng ...</h3>
                <div class="total-amount" id="total-salary">0 đ</div>
                <div id="salary-breakdown"
                    style="margin-top: 15px; font-size: 14px; color: var(--text-muted); border-top: 1px dotted #555; padding-top: 10px;">
                    <!-- Breakdown goes here JS -->
                </div>
            </div>
        </div>
    </div>
    <script src="settings.js"></script>
</body>

</html>
