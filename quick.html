<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chấm Công Tính Tiền Nhanh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body, .app-container { background-color: #2a2a35; }
        .app-container { justify-content: flex-start; }
        
        .quick-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .quick-back { color: #00ffff; font-size: 18px; text-decoration: none; font-weight: 500; }
        .quick-back i { margin-right: 5px; }
        .quick-gear { color: #888; font-size: 22px; text-decoration: none; }
        
        .quick-total-container { display: flex; justify-content: flex-end; padding: 0 15px; margin-bottom: 5px; }
        .quick-total { font-size: 32px; font-weight: 700; color: #00ffff; height: 38px; }
        
        .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); padding: 5px 10px; margin-bottom: 5px; }
        .cal-header div { text-align: center; color: #888; font-size: 18px; font-weight: 600; }
        .cal-header .active-tab { color: #fff; background: #444; border-radius: 6px; padding: 2px 0; }
        .cal-header .red { color: #ff4d4d; }
        
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 0 10px; flex: 1; align-content: start; overflow-y: auto; }
        .cal-cell { 
            background: #333; border: 1px solid #444; border-radius: 6px; 
            aspect-ratio: 1/1.25; position: relative; cursor: pointer; display: flex; flex-direction: column; 
            justify-content: flex-end; align-items: center; padding-bottom: 8px; transition: transform 0.1s;
        }
        .cal-cell:active { transform: scale(0.95); }
        .cal-cell.today { border: 1px solid #00ff00; }
        .cal-cell.today .date-top { color: #00ff00; }
        .cal-cell .date-top { position: absolute; top: 6px; left: 8px; font-size: 18px; font-weight: 600; color: #ccc; }
        .cal-cell .cell-value { font-size: 26px; font-weight: 700; color: #00ffff; line-height: 1; }
        
        .quick-footer { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: #2a2a35; border-top: 1px solid #444; }
        .btn-calc { background: #ffff00; color: #000; font-size: 20px; font-weight: 800; padding: 8px 40px; border-radius: 20px; border: none; cursor: pointer; text-decoration: none; }
        
        .month-selector { background: #333; display: flex; border-radius: 20px; padding: 4px; gap: 5px; }
        .m-item { color: #888; font-size: 16px; font-weight: 600; padding: 6px 12px; cursor: pointer; border-radius: 16px; border: 1px solid transparent; }
        .m-item.active { color: #fff; border-color: #00ff00; }
        
        /* Modal Style */
        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(2px); }
        .modal-content { background: #2a2a35; padding: 25px; border-radius: 16px; width: 85%; text-align: center; border: 1px solid #00ff00; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-title { color: #fff; font-size: 20px; margin-bottom: 20px; font-weight: 600; }
        .modal-input { width: 100%; background: #1a1a20; border: 1px solid #555; color: #00ffff; font-size: 32px; text-align: center; padding: 15px; border-radius: 12px; margin-bottom: 25px; font-weight: bold; }
        .modal-input:focus { outline: none; border-color: #00ff00; }
        .modal-actions { display: flex; gap: 15px; }
        .modal-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #444; color: #fff; }
        .btn-save { background: #00ff00; color: #000; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="quick-header">
            <a href="index.html" class="quick-back"><i class="fa-solid fa-chevron-left"></i> Chấm công tính tiền nhanh</a>
            <a href="settings.html" class="quick-gear"><i class="fa-solid fa-gear"></i></a>
        </header>

        <div class="quick-total-container">
            <div class="quick-total" id="quick-total"></div>
        </div>

        <div class="cal-header">
            <div>T2</div><div class="active-tab">T3</div><div>T4</div><div>T5</div><div>T6</div><div class="red">T7</div><div class="red">CN</div>
        </div>
        
        <div class="cal-grid" id="cal-grid">
            <!-- Grid generated by JS -->
        </div>

        <footer class="quick-footer">
            <a href="settings.html" class="btn-calc"><i class="fa-solid fa-dollar-sign"></i></a>
            <div class="month-selector" id="month-selector">
                <!-- JS -->
            </div>
        </footer>

        <!-- Modal -->
        <div class="modal-overlay" id="quick-modal">
            <div class="modal-content">
                <div class="modal-title" id="modal-title">Nhập công ngày ...</div>
                <input type="number" step="0.5" id="modal-val" class="modal-input" placeholder="0">
                <div class="modal-actions">
                    <button class="modal-btn btn-cancel" id="modal-cancel">Hủy</button>
                    <button class="modal-btn btn-save" id="modal-save">Lưu</button>
                </div>
            </div>
        </div>
    </div>
    <script src="quick.js"></script>
</body>
</html>
